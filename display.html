<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NDPi Monitor Display</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100vw;
            height: 100vh;
            background: #000;
            overflow: hidden;
            cursor: none;
        }

        #display-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        #overlay-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #overlay-svg {
            opacity: 0;
            width: auto;
            height: 50vh;
            object-fit: contain;
            transition: opacity 800ms ease;
        }

        #waiting-for-server-svg {
            position: absolute;
            left: 0;
            top: 0;
            margin: 1vh;
            width: 8vh;
            transition: opacity 300ms ease;
        }

        #attempting-ndi-connection-svg {
            position: absolute;
            right: 0;
            top: 0;
            margin: 1vh;
            width: 6vh;
            transition: opacity 300ms ease;
        }

        .status-indicator {
            position: absolute;
            width: 100vw;
            height: 10vh;
            top: 0;
            display: flex;
            align-items: flex-start;
            justify-content: flex-end;
        }
    </style>
    <style>
        .spinner_V8m1 {
            transform-origin: center;
            animation: spinner_zKoa 2s linear infinite
        }

        .spinner_V8m1 circle {
            stroke-linecap: round;
            animation: spinner_YpZS 1.5s ease-in-out infinite
        }

        @keyframes spinner_zKoa {
            100% {
                transform: rotate(360deg)
            }
        }

        @keyframes spinner_YpZS {
            0% {
                stroke-dasharray: 0 150;
                stroke-dashoffset: 0
            }

            47.5% {
                stroke-dasharray: 42 150;
                stroke-dashoffset: -16
            }

            95%,
            100% {
                stroke-dasharray: 42 150;
                stroke-dashoffset: -59
            }
        }
    </style>
</head>

<body>
    <!--div class="status-indicator"-->
        <div id="waiting-for-server-svg" style="opacity: 1;">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
                <circle fill="none" stroke-opacity="1" stroke="#81C127" stroke-width=".5" cx="100" cy="100" r="0">
                    <animate attributeName="r" calcMode="spline" dur="1.5" values="1;80" keyTimes="0;1"
                        keySplines="0 .2 .5 1" repeatCount="indefinite"></animate>
                    <animate attributeName="stroke-width" calcMode="spline" dur="1.5" values="0;25" keyTimes="0;1"
                        keySplines="0 .2 .5 1" repeatCount="indefinite"></animate>
                    <animate attributeName="stroke-opacity" calcMode="spline" dur="1.5" values="1;0" keyTimes="0;1"
                        keySplines="0 .2 .5 1" repeatCount="indefinite"></animate>
                </circle>
            </svg>
        </div>
        <div id="attempting-ndi-connection-svg" style="opacity: 0;">
            <svg stroke="#81c127" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <g class="spinner_V8m1">
                    <circle cx="12" cy="12" r="9.5" fill="none" stroke-width="2.5"></circle>
                </g>
            </svg>
        </div>
    <!--/div-->
    <div id="display-container">
        <div id="overlay-container">
            <img id="overlay-svg" src="" alt="NDPi Monitor">
        </div>
    </div>

    <script>
        const svgContainer = document.getElementById('overlay-svg');
        const defaultSvgSrc = '/assets/NLC_Logo_Overlay.svg';

        const loader_FindingSource = document.getElementById('attempting-ndi-connection-svg');

        let ws;
        let reconnectInterval;

        /*
        setTimeout(() => {
            if (window.name !== 'test') {
                window.open(`${window.location.protocol}//${window.location.host}`, "test", "popup");
            }
        }, 1500);
        */

        function waitingForServer(show) {
            if (show) {
                document.getElementById('waiting-for-server-svg').style.opacity = 1;
            } else {
                document.getElementById('waiting-for-server-svg').style.opacity = 0;
            }
        }

        function connectingToSource(show) {
            if (show) {
                document.getElementById('attempting-ndi-connection-svg').style.opacity = 1;
            } else {
                document.getElementById('attempting-ndi-connection-svg').style.opacity = 0;
            }
        }

        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}`);

            ws.onopen = () => {
                console.log('Connected to display server');
                if (reconnectInterval) {
                    clearInterval(reconnectInterval);
                    reconnectInterval = null;
                }
            };

            ws.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    handleDisplayCommand(msg);
                } catch (e) {
                    console.error('Invalid message:', e);
                }
            };

            ws.onclose = () => {
                console.log('Disconnected from display server');
                if (!reconnectInterval) {
                    reconnectInterval = setInterval(connect, 5000);
                }
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };
        }

        function handleDisplayCommand(msg) {
            switch (msg.type) {
                case 'ndpi-server-connected':
                    waitingForServer(false);
                    break;
                case 'ndi-init':
                    connectingToSource(true);
                    break;
                case 'ndi-started':
                    hideAll();
                    break;
                case 'show-overlay':
                    showOverlay();
                    break;
                case 'show-blank':
                    showBlank();
                    break;
                case 'show-ndi':
                    hideAll();
                    break;
                case 'show-custom-overlay':
                    showBlank();
                    setTimeout(() => {
                        showOverlay(msg.srcPth);
                    }, 800);
            }
        }

        function showOverlay(source = defaultSvgSrc) {
            svgContainer.src = source;
            setTimeout(() => {
                svgContainer.style.opacity = 1;
            }, 200);
        }

        function showBlank() {
            svgContainer.style.opacity = 0;
        }

        function hideAll() {
            showBlank();
            connectingToSource(false);
            waitingForServer(false);
        }

        // Start with overlay visible
        // Connect to display server
        setTimeout(() => {
            showOverlay();
            connect();
        }, 500);

        // Prevent screen from sleeping
        if ('wakeLock' in navigator) {
            console.log('Wake lock active.')
            navigator.wakeLock.request('screen').catch(e => console.log('Wake lock failed:', e));
        }
    </script>
</body>

</html>
